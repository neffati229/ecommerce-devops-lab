name: Full DevOps Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    outputs:
      instance_ips: ${{ steps.export.outputs.instance_ips }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export Instance IPs
        id: export
        run: |
          IPS=$(terraform output -json instance_public_ips 2>/dev/null | jq -r '.[]' | tr '\n' ' ')
          echo "instance_ips=$IPS" >> $GITHUB_OUTPUT

  ansible:
    name: Configure Servers
    runs-on: ubuntu-latest
    needs: terraform
    if: needs.terraform.outputs.instance_ips != ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible jq

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Generate Inventory
        run: |
          echo "[web]" > inventory.ini
          for ip in ${{ needs.terraform.outputs.instance_ips }}; do
            echo "$ip ansible_user=ubuntu ansible_ssh_private_key_file=key.pem" >> inventory.ini
          done
          echo "" >> inventory.ini
          echo "[web:vars]" >> inventory.ini
          echo "ansible_python_interpreter=/usr/bin/python3" >> inventory.ini
          echo "" >> inventory.ini
          echo "[local]" >> inventory.ini
          echo "localhost ansible_connection=local" >> inventory.ini
          echo "" >> inventory.ini
          echo "[all:children]" >> inventory.ini
          echo "web" >> inventory.ini
          echo "local" >> inventory.ini
          cat inventory.ini

      # ✅ FIX PRINCIPAL : ansible.cfg avec allow_world_readable_tmpfiles
      # Cela désactive les ACLs qui causent l'erreur chmod 'A+user:appuser:rx:allow'
      - name: Create Ansible config
        run: |
          cat > ansible.cfg << 'EOF'
          [defaults]
          host_key_checking = False
          allow_world_readable_tmpfiles = True
          remote_tmp = /tmp/.ansible/tmp

          [ssh_connection]
          ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30
          retries = 3
          EOF

      - name: Wait for SSH to be ready
        run: |
          for ip in ${{ needs.terraform.outputs.instance_ips }}; do
            echo "Attente SSH sur $ip..."
            for i in $(seq 1 20); do
              if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i key.pem ubuntu@$ip "echo ok" 2>/dev/null; then
                echo "$ip est prêt"
                break
              fi
              echo "Tentative $i/20, nouvel essai dans 10s..."
              sleep 10
            done
          done

      - name: Run Ansible Playbook
        run: ansible-playbook -i inventory.ini ansible/deploy_full.yml -v
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_ALLOW_WORLD_READABLE_TMPFILES: "true"
          ANSIBLE_REMOTE_TMP: "/tmp/.ansible/tmp"
