---
- name: Déploiement complet e-commerce
  hosts: web
  become: yes
  vars:
    app_user: appuser
    app_dir: /opt/ecommerce

  tasks:
    - name: Créer l'utilisateur appuser
      user:
        name: "{{ app_user }}"
        state: present
        create_home: yes
        shell: /bin/bash

    - name: Mettre à jour apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Installer Docker
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Démarrer Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Ajouter les utilisateurs au groupe docker
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - ubuntu
        - "{{ app_user }}"

    - name: Installer Node.js 18
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
        apt install -y nodejs

    - name: Installer PM2
      npm:
        name: pm2
        global: yes

    - name: Créer le répertoire de l'application
      file:
        path: "{{ app_dir }}/app"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Créer l'application Node.js
      copy:
        content: |
          const http = require('http');
          const server = http.createServer((req, res) => {
            res.writeHead(200, { 'Content-Type': 'text/html; charset=utf-8' });
            res.end(`
              <!DOCTYPE html>
              <html>
              <head><title>E-commerce Store</title>
              <style>
                body { font-family: Arial; margin: 40px; text-align: center; }
                h1 { color: #e67e22; }
                .success { color: green; }
              </style>
              </head>
              <body>
                <h1>🛍️ Boutique E-commerce</h1>
                <p class="success">✓ Déploiement réussi avec Ansible !</p>
                <p>Serveur: ${require('os').hostname()}</p>
                <p>Node.js: ${process.version}</p>
                <hr>
                <small>DevOps IaaS - Projet complet</small>
              </body>
              </html>
            `);
          });
          server.listen(3000, () => console.log('App running on port 3000'));
        dest: "{{ app_dir }}/app/server.js"
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: '0755'

    - name: Créer package.json (via shell)
      shell: |
        cd "{{ app_dir }}/app"
        echo '{"name":"ecommerce-app","version":"1.0.0","main":"server.js"}' > package.json
        chown {{ app_user }}:{{ app_user }} package.json

    - name: Démarrer l'application avec PM2
      shell: |
        cd "{{ app_dir }}/app"
        pm2 start server.js --name ecommerce-app

    - name: Sauvegarder PM2
      command: pm2 save

    - name: Installer Nginx
      apt:
        name: nginx
        state: present

    - name: Configurer Nginx
      copy:
        content: |
          server {
              listen 80;
              server_name _;
              location / {
                  proxy_pass http://localhost:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Host $host;
              }
          }
        dest: /etc/nginx/sites-available/ecommerce

    - name: Activer le site
      file:
        src: /etc/nginx/sites-available/ecommerce
        dest: /etc/nginx/sites-enabled/ecommerce
        state: link

    - name: Supprimer default site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      ignore_errors: yes

    - name: Redémarrer Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    - name: Afficher l'URL d'accès
      debug:
        msg: "Application déployée sur http://{{ ansible_default_ipv4.address }}"
