---
- name: Déployer MongoDB avec Docker
  hosts: web
  become: yes
  tasks:
    - name: Créer le volume pour MongoDB
      docker_volume:
        name: mongodb_data
        state: present

    - name: Lancer conteneur MongoDB
      docker_container:
        name: mongodb
        image: mongo:5.0  # Version compatible
        restart_policy: always
        ports:
          - "27017:27017"
        volumes:
          - mongodb_data:/data/db
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password

    - name: Attendre que MongoDB soit prêt
      wait_for:
        port: 27017
        delay: 5
        timeout: 30

    - name: Installer driver MongoDB compatible
      shell: |
        cd /opt/ecommerce/app
        sudo -u appuser npm install mongodb@5.0.0
      ignore_errors: yes
